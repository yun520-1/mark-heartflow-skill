name: agentmemory
version: 0.1.0
description: "心虫持久化记忆插件 — agentmemory 跨会话记忆，95.2% R@5。BM25+向量+图检索，本地 Embedding，无外部DB。"
author: "HeartFlow"
homepage: "https://github.com/rohitg00/agentmemory"
trigger:
  keywords:
    - 记住
    - 回忆
    - 搜索记忆
    - 历史记录
    - 之前说过
    - 长期记忆
    - 跨会话
  hooks:
    - prefetch
    - sync_turn
    - on_session_end
    - on_pre_compress
    - on_memory_write
    - system_prompt_block

tools:
  - name: memory_recall
    description: 在心虫记忆库中搜索关键词回忆
  - name: memory_save
    description: 将洞见、决策、模式存入长期记忆
  - name: memory_search
    description: 混合语义+关键词搜索所有记忆

config:
  agentmemory_url:
    type: string
    default: http://localhost:3111
    env: AGENTMEMORY_URL
  agentmemory_secret:
    type: string
    default: ""
    env: AGENTMEMORY_SECRET

install:
  - npx -y @agentmemory/agentmemory
  - or: npm install -g @agentmemory/agentmemory
  - then: agentmemory

health_check:
  url: http://localhost:3111/agentmemory/health
  expected: '{"status":"healthy"}'