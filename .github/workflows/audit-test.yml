name: audit-test
on: [push, pull_request]
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci --ignore-scripts
      - run: npm audit --audit-level=high
      - run: npm test
      - run: npm run test:unit
